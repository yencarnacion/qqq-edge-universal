server_port: 8089
market_data:
  provider: massive # databento or massive
alert:
  # Optional legacy single sound (used as fallback if up/down not set)
  sound_file: "./web/sounds/hey.mp3"

  # NEW: directional sounds
  up_sound_file: "./web/sounds/alert_up.mp3"
  down_sound_file: "./web/sounds/alert_down.mp3"

  enable_sound: true
  cooldown_seconds: 10
timezone: "America/New_York"
logging:
  level: info
persistence:
  state_file: "state.json"
ui:
  chart_opener_base_url: "http://localhost:8081"  # Ticker click target base, used as: {base}/api/open-chart/{TICKER}/{YYYY-MM-DD}
  auto_now_seconds: 10                            # Auto button countdown/trigger interval in seconds
  pace_of_tape_window_seconds: 60                # Rolling breakout-alert window for the tape pace indicator
  live_colors:
    tiny_cap_max: 10000000            # Only change market-cap text color on live cards if below this USD threshold
    industry_regex: "(medical|bio)"   # Regex (runtime enforced case-insensitive) to color industry text on live cards
